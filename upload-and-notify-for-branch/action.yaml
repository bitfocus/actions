name: "Upload build and notify BitFocus API Server"
description: "Upload build and notify BitFocus API Server"
inputs:
  source-filename:
    description: "File to upload"
    required: true
    default: ""
  destination-filename:
    description: "Target filename in s3"
    required: true
    default: ""
  s3-host:
    description: "Server endpoint"
    required: true
    default: "s4.bitfocus.io"
  s3-bucket:
    description: "Bucket to upload to"
    required: true
    default: ""
  s3-access-key:
    description: "Access Key"
    required: true
    default: ""
  s3-secret-key:
    description: "Secret Key"
    required: true
    default: ""

  api-version:
    description: "Version number to report to api server (eg 1.0.0+1234-abcdefg)"
    required: true
    default: ""
  api-branch:
    description: "Name of branch to report to api server"
    required: false
    default: ""
  api-product:
    description: "Name of the product"
    required: true
    default: ""
  api-target:
    description: "Build target (linux-img/linux-deb/linux-tgz/mac-intel/mac-arm/win-x86/win-x64)"
    required: true
    default: ""
  api-secret:
    description: "Secret for the api server"
    required: true
    default: ""
  upload-url-override:
    description: "Override the URL reported to the API server for the uploaded file"
    required: false
    default: ""
outputs:
  upload-url:
    description: "The URL of the uploaded file as reported to the API server"
    value: ${{ steps.notify.outputs.upload-url }}
runs:
  using: "composite"
  steps:
    - name: Download minio client
      uses: bitfocus/actions/download-minio-client@main

    - name: Upload file
      shell: bash
      run: |
        S3_HOST="${{ inputs.s3-host }}"
        [[ "$S3_HOST" != https://* ]] && S3_HOST="https://${S3_HOST}"

        ./mc alias set remote/ "${S3_HOST}" ${{ inputs.s3-access-key }} ${{ inputs.s3-secret-key }}

        ./mc cp "${{ inputs.source-filename }}" "remote/${{ inputs.s3-bucket }}/${{ inputs.destination-filename }}"

    - name: Notify API Server
      id: notify
      shell: bash
      run: |
        # This seems like the most portable way we can do this
        if ${{ runner.os == 'macOS' }}; then
          SHA512=$(openssl dgst -sha512 -binary "${{ inputs.source-filename }}" | base64)
        else
          SHA512=$(openssl dgst -sha512 -binary "${{ inputs.source-filename }}" | base64 -w 0)
        fi

        # Use minio and jq for this as we know both will be available
        SIZE=$(./mc stat "${{ inputs.source-filename }}" --json | jq .size)

        UPLOAD_URL="${{ inputs.upload-url-override }}"
        if [[ -z "$UPLOAD_URL" ]]; then
          S3_HOST="${{ inputs.s3-host }}"
          [[ "$S3_HOST" != https://* ]] && S3_HOST="https://${S3_HOST}"
          UPLOAD_URL="${S3_HOST}/${{ inputs.s3-bucket }}/${{ inputs.destination-filename }}"
        fi
        echo "upload-url=${UPLOAD_URL}" >> "$GITHUB_OUTPUT"

        curl -X 'POST' \
          'https://api.bitfocus.io/v1/product/${{ inputs.api-product }}/package' \
          -H 'accept: application/json' \
          -H 'Content-Type: application/json' \
          -d '{
          "branch": "${{ inputs.api-branch }}",
          "version": "${{ inputs.api-version }}",
          "target": "${{ inputs.api-target }}",
          "filename": "${{ inputs.destination-filename }}",
          "filesize": "'${SIZE}'",
          "filesha512": "'${SHA512}'",
          "url": "'${UPLOAD_URL}'",
          "secret": "${{ inputs.api-secret }}"
        }'
